apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: oauth2-callback
  namespace: wac-hospital
spec:
  parentRefs:
    - name: wac-hospital-gateway
      sectionName: fqdn
  rules:
    - matches:
        - path:
            type: Exact
            value: /authn/callback
      filters:
        - type: RequestRedirect
          requestRedirect:
            path:
              type: ReplaceFullPath
              replaceFullPath: /oauth2/callback
            statusCode: 302