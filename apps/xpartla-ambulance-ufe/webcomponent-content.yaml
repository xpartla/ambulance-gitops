apiVersion: polyfea.github.io/v1alpha1
kind: WebComponent
metadata:
  name: xpartla-ambulance-ufe-content
spec:
  microFrontend: xpartla-ambulance-ufe
  element: xpartla-ambulance-wl-app
  attributes:
        - name: base-path
          value: ./xpartla-ambulance-wl/
        - name: api-base
          value: http://localhost:30081/api
  displayRules:
    - allOf:
        - context-name: main-content
        - path: "^(\\.?/)?xpartla-ambulance-wl(/.*)?$"